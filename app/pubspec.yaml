name: ecoblocks_app
description: EcoBlocks ecological automation control app.
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  ecoblocks_core:
    path: ../agent/core
  flutter_inappwebview: ^5.8.0
  intl: any
  path_provider: ">=2.1.0 <2.1.6"

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/blockly/index.html
    - assets/blockly/ink_style.css
    - assets/blockly/ink_background.png
    - assets/blockly/bridge_runtime.js
    - assets/blockly/ecoblocks.js
    - assets/blockly/agent_overlay.js
