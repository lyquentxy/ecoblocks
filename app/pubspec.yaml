name: ecoblocks_app
description: EcoBlocks — 生态自动化控制 APP
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  ecoblocks_core:
    path: ../packages/ecoblocks_core
  flutter_inappwebview: ^5.8.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/blockly/index.html
    - assets/blockly/ink_style.css
    - assets/blockly/bridge_runtime.js
    - assets/blockly/ecoblocks.js
    - assets/blockly/agent_overlay.js
