plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.ecoblocks"
    compileSdk = libs.versions.compileSdk.get().toInteger()

    compileOptions {
        sourceCompatibility = JavaVersion.toVersion(libs.versions.javaSource.get())
        targetCompatibility = JavaVersion.toVersion(libs.versions.javaSource.get())
    }

    kotlinOptions {
        jvmTarget = libs.versions.javaSource.get()
    }

    defaultConfig {
        applicationId = "com.ecoblocks"
        minSdk = libs.versions.minSdkModern.get().toInteger()
        targetSdk = libs.versions.targetSdk.get().toInteger()
        versionCode = 1
        versionName = "0.1.0"
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
