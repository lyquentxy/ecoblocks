pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }
    settings.ext.flutterSdkPath = flutterSdkPath()

    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        maven { name 'aliyun-google'; url 'https://maven.aliyun.com/repository/google' }
        maven { name 'aliyun-public'; url 'https://maven.aliyun.com/repository/public' }
        maven { name 'aliyun-gradle'; url 'https://maven.aliyun.com/repository/gradle-plugin' }
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.2.1" apply false
    id "org.jetbrains.kotlin.android" version "1.9.0" apply false
}

dependencyResolutionManagement {
    repositoriesMode = RepositoriesMode.PREFER_PROJECT
    repositories {
        maven { name 'aliyun-google'; url 'https://maven.aliyun.com/repository/google' }
        maven { name 'aliyun-public'; url 'https://maven.aliyun.com/repository/public' }
        maven { name 'aliyun-gradle'; url 'https://maven.aliyun.com/repository/gradle-plugin' }
    }
}

include ":app"
