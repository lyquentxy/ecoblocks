<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoBlocks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #blocklyArea { width: 100%; height: 100%; }
    #blocklyDiv { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="blocklyArea">
    <div id="blocklyDiv"></div>
  </div>
  <xml id="toolbox" style="display: none">
    <category name="传感器" colour="#5b8c5a">
      <block type="sensor_temp"></block>
      <block type="sensor_humidity"></block>
    </category>
    <category name="执行器" colour="#8c5a5a">
      <block type="actuator_fan"></block>
      <block type="actuator_light"></block>
    </category>
    <category name="逻辑" colour="#5a6b8c">
      <block type="logic_compare"></block>
      <block type="controls_if"></block>
    </category>
  </xml>
</body>
</html>
